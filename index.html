<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 13 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <button id="button1">Grow Larger</button>
    <button id="button2">Grow Smaller</button>
    <button id="button3">Move Right</button>
    <button id="button4">Move Left/Down</button>
    <button id="button5">Return to start</button>

    <div class="avatar">
      <img
        src="https://www.khanacademy.org/images/avatars/svg/aqualine-sapling.svg"
        width="150"
      />
      <h1>Aqualine</h1>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    
      // ======================== Button #1
      $("#button1").click(function () {
       
       $(".avatar").animate({
        width: "400px",
       });

       $("img").animate({
        width: "250px",
       });

      });

      // ======================== Button #2
      $("#button2").click(function () {
     $(".avatar").animate({
        width: "250px",
       });

       $("img").animate({
        width: "150px",
       });

      });

      // ======================== Button #3
      $("#button3").click(function () {
    $(".avatar").animate({
        marginLeft: "500px",
       });
      });

       // ======================== Button #4
      $("#button4").click(function () {
    $(".avatar").animate({
        marginLeft: "0px",
        marginTop: "400px",
        
       });

      });


      // ======================== Button #5
      $("#button5").click(function () {
     $(".avatar").animate({
        width: "250px",
        marginTop: "0px",
        marginLeft:"0px",
       });

       $("img").animate({
        width: "150px",
       });


      });
    
    
    
    </script>
  </body>
</html>
